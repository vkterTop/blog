          - generic [ref=f2e40]:
            - paragraph [ref=f2e41]: 至今仍有人不明白，“皇汉”最大的破坏在于摧毁了以八旗为荣的思想根基，这正是他们眼中最严重的“坏事”。从上世纪80年代开始，大量电影、电视剧和小说——包括那些出自大作家之手的耳熟能详的作品——都在潜移默化地塑造一种认知：英明神武的圣天子高高在上，俊男靓女缠绵悱恻的眼神令人着迷。这些作品演得太好，持续了几代人，让观众不知不觉卸下心防，逐渐相信真有“圣天子在上”。一代人被养育成这样的观念，便会影响他们的子女，再传一代。当这些内容铺天盖地涌来时，人们的思想便开始转变。
            - paragraph [ref=f2e42]: 在建国初期，国内外但凡拍摄任何涉及“不文明时期”的影视作品，若未进行严厉批判，在当时就会被定性为反动影片。彼时，在精神、文化与叙事权领域的高地争夺战中，任何对“不文明时代”的正向描述——哪怕是看似客观中立的“正史”笔法——都绝不允许，除非进行彻底批判。思想高地的争夺战正是这样打的。然而后来情况变了，要求“客观、中立、真诚”地对待历史。于是思想软化了，人们开始认为：皇帝也是人，也能做好事，圣天子可以上街遛弯；臣子呢，有忠有奸，有聪明有笨。当形象变成这样，公众的心态就开始转变，进而影响整体舆论氛围。所有这一切，都从那个时代开始逐渐改变。风向一变，人们心中的认知便随之改变。
            - paragraph [ref=f2e43]: 这就涉及话语权的问题。话语权，简单来说，就是我们的文艺工作者有权为谁说话、无权为谁说话——而这，现在并不掌握在我们手中。时事之痛并不可怕，可怕的是不知痛，甚至乐在其中。所以，眼下并非什么特别坏的局面。你看这几天有多少大咖纷纷破防？我明明没有点名，结果有人自己冲出来顶杠认账，质问“你凭什么笑我？”——这就很尴尬了。
            - paragraph [ref=f2e44]: 前些天我们推荐过《国史大纲》。这是一部标准的以史为鉴之作，虽是一部通史，却与别书不同：它诞生于绝望之间，意在为整个国家、整个民族留存一份记忆的压缩包，因此从立身之本上记述了我们的整个历史源流。这是一部极好的入门级著作，应该收入家中慢慢品读。书中的文字未必极其优美顺畅，但值得细看，而家中备有一套却至关重要，因为那是那个时代的学者所能总结出的、关于我们民族漫长文明史最为重要的核心内容压缩包。哪怕只读了开篇介绍，也会产生共鸣。开篇便强调：一群人生活在一起时，要有一种“我们是一家人”的感觉。而怎样才能有这种感觉？在于拥有共同的记忆，这共同的记忆便是历史，是我们共同经历的过往。所以我们得了解一点历史。但仅仅知道还不够，还必须对这段历史抱有温情——要视其为自己的来路，而不是以旁观者姿态围观。
            - paragraph [ref=f2e45]: 这正是我一直强调的：历史有视角问题。当你站在遥远的地方去审视它，便是将其视为一种客体，完全可以看作别人家的事。一旦视为别人家的事，它便与你无关，也就不再是共同的历史记忆。共同的历史记忆，要求在了解历史之外，还要有正确的主语叙事和观察视角，如此你才能明白：在这段历史中，你该共情谁、同情谁、赞赏谁，该与谁站在一起。大家这几天格外发现这件事的重要性了吧？同样是讲述历史，站在不同的角度去看，得出的结论截然不同。最近为何许多人极为恼火，又为何有些人居高临下地指指点点？因为大家站在了不同的地方看问题。我们普通人看到的是：祖先是谁，他们遭遇了什么，他们在哭泣，他们面临生死危难，于是我们的心随之缩紧。而另一些人却高高在上，仿佛站在火星上看待此事，以为不过是“凑位起了”而已，很好啊，谁反对就拖下去。这便是历史温情感的差异。
            - paragraph [ref=f2e46]: 至于大城市病和个人原子化，有办法缓解吗？只要我们延续现有的城市化生存模式，这个问题就不可能直接解决。若说缓解，倒有通道——便是传媒。直接解决确实无法做到，因为大家的经济形式已不再像过去一样抱团。当利益变得分散，人们便开始趋向原子化。如同明代中晚期，市民阶层原子化的主要原因就在于商品经济活跃：普通人在城市中可以独立谋得一份收入，女子也能单独立户。当一个人便能好好生活时，原子化倾向便逐渐出现。这是经济带来的结果，这一点无法避免，只要追求商品经济，它就会出现。但从另一个维度看，可以在传媒领域进行补强。然而现在，我们的传媒领域并未完全掌握在站在中国这一边的人手中，这几十年来在叙事上颇有问题。因此，传媒领域应当进行深度的深耕和高度管理，甚至进行大洗牌亦不为过。通过传媒，可以传播共识。过去几十年间，一些共识慢慢消失，正是传媒之“功”。既然是由它造成，如今要弥合，也需要用同样的工具。工具本身并无善恶，区别在于谁在使用它。
            - paragraph [ref=f2e47]: 什么是思想殖民？它改变你想问题的方式——当然也会改变你思考的内容，但最根本的，是改变你的思想方式。是否记得从上世纪末开始，大量公知反复强调一个概念：要求你“独立思考”。但凡稍稍经历过那个时代或曾进行过“坟头考古”的人，应该都见过那些所谓的学者——实际上就是公知——不停强调中国人要具备“独立思考能力”。但在当时，这个做法其实是在消解你原有的思想和共识。那个时代的中国人心中本有许多共识：对经济怎么看，对文化怎么看，以及“帝国主义亡我之心不死”等等。不要觉得这些符号很土、很low。只要有共识，我们之间便有强烈的共鸣和共同点。那时这些东西都还在，而公知却要求你“独立思考”——他在做什么？他在消解你的共识，叫你把共识扔到一边，听他的。当时公知强调“独立思考”，实质上是要求你放弃共识，强调个体化。到今天我们就明白了：当一个人被孤立，原子化，完全个体化，与过往、与家人朋友、与所有群体都割离开来，就会变得极其脆弱——别人说什么，你就信什么。这是人类作为群居生物的天然特性：你需要抱团。若在现实生活中不能抱团取暖，就会在互联网上寻找虚拟的抱团。所以，自从“独立思考”被强化之后，你会发现各种亚文化群体开始此起彼伏地诞生。亚文化群体系做什么？就是把那些从原有的社会共识中被抽离出来的人，安排进一个小圈子，让他们拥有新的共识。但这个新共识，与社会应有的公共共识不兼容。这就是将人打散。这就是精神殖民。
            - paragraph [ref=f2e48]: 它在转变的最重要之处，便是你的思想方式。在那个时代，很多年轻人以拥有共识为耻——与纲领保持一致，与毛选保持一致，在他们心中被认为是没有个性。但通过这样的方式，社会被割裂成极小的一块块板块，进而方便下一波洗脑信息的传播。这样的两个步骤，就是将人打散的步骤，至今仍产生着巨大的影响力。
