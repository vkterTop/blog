          - link "清朝历史 2026-07-07 看清历史需要先找到自己的立场 为什么说辛亥革命不彻底？辛亥革命没有能够完全成功，成功了一部分，但没有完全成功。有人说“看待历史别陷入个人情绪，别有立场”，我倒觉得可以将其作为反面教材来聊一下。看待历史，一定要先找准立场。所有正常人都必须记得，看待历史务必要先找准历史的站位，务必明确一件事，那就是“我是谁”。 历史叙事是记叙文，必须包含时间、地点、人…… 清朝历史 看清历史需要先找到自己的立场" [ref=f6e4718] [cursor=pointer]:
